version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gestao_financeira_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestao_financeira
    ports:
      - "5434:5432"
    volumes:
      - pgdata_gestao_financeira:/var/lib/postgresql/data

volumes:
  pgdata_gestao_financeira:
